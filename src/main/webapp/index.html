<!DOCTYPE html>
<html>
<head>
    <title>TechTogether</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url("images/background.jpg") no-repeat center center/cover;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4));
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* INTRO SCREEN */
        .intro {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: introFade 3s forwards;
        }

        .intro-logo {
            width: 200px;
            animation: logoMove 3s forwards;
        }

        @keyframes logoMove {
            0% {
                transform: scale(1.5);
                opacity: 0;
            }
            30% {
                opacity: 1;
                transform: scale(1.2);
            }
            60% {
                transform: scale(1);
            }
            100% {
                transform: translate(-600px, -250px) scale(0.35);
            }
        }

        @keyframes introFade {
            0%, 80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* NAVBAR */
        .navbar {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            width: 55px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            padding: 6px;
            box-shadow: 0 0 15px rgba(0,198,255,0.7);
            animation: glow 2s infinite alternate;
        }

        .logo span {
            font-size: 22px;
            font-weight: 600;
        }

        /* HERO */
        .hero {
            position: relative;
            z-index: 2;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            opacity: 0;
            animation: showHero 3.2s ease forwards;
        }

        .hero h1 {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .hero span {
            color: #00c6ff;
        }

        .hero p {
            color: #ccc;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00c6ff;
        }

        /* ANIMATIONS */
        @keyframes glow {
            from { box-shadow: 0 0 10px #00c6ff; }
            to { box-shadow: 0 0 25px #00c6ff; }
        }

        @keyframes showHero {
            0% { opacity: 0; }
            80% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* RESPONSIVE */
        @media(max-width: 768px) {

            .hero h1 {
                font-size: 35px;
            }

            .logo img {
                width: 45px;
            }

            /* Adjust animation for small screens */
            @keyframes logoMove {
                100% {
                    transform: translate(-250px, -200px) scale(0.4);
                }
            }
        }

    </style>
</head>

<body>

    <!-- INTRO -->
    <div class="intro">
        <img src="images/logo.png" class="intro-logo">
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">
            <img src="images/logo.png">
            <span>TechTogether</span>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h1>Build. Connect. <span>Grow.</span></h1>
        <p>A platform where developers collaborate and innovate together.</p>

        <a href="login.html">
            <button class="btn">Get Started</button>
        </a>
    </div>

</body>
</html>
